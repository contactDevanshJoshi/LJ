<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Content */
.content{
  padding:20px;
  padding-bottom:100px;
}

/* Student Card */
.student-card{
  background:linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.04));
  border:1px solid rgba(34,197,94,0.2);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.student-header{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}

.avatar{
  width:50px;height:50px;
  background:#22c55e;
  color:#0f172a;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}

.details-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.detail-item{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

.hod{grid-column:1/3}

.small{font-size:12px;color:#94a3b8}

/* Subjects */
.subject{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.subject:active{
  background:#22c55e20;
}

/* Bottom Nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav div{
  color:#94a3b8;
  font-size:12px;
}

.active{color:#22c55e}
</style>
</head>

<body>

<div class="header">
  <h2>Dashboard</h2>
</div>

<div class="content">

  <!-- Student Info -->
  <div class="student-card">
    <div class="student-header">
      <div class="avatar" id="avatar">A</div>
      <div>
        <div id="name">Name</div>
        <div class="small" id="enroll">Enrollment</div>
      </div>
    </div>

    <div class="details-grid">
      <div class="detail-item">
        <div class="small">Department</div>
        <div id="dept"></div>
      </div>
      <div class="detail-item">
        <div class="small">Semester</div>
        <div id="sem"></div>
      </div>
      <div class="detail-item hod">
        <div class="small">HOD</div>
        <div id="hod"></div>
      </div>
    </div>
  </div>

  <!-- Subjects -->
  <div class="small" style="margin-bottom:10px;">Subjects</div>
  <div id="subjects"></div>

</div>

<div class="nav">
  <div class="active">Home</div>
  <div>Subjects</div>
  <div>Profile</div>
</div>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 Load user
const user = JSON.parse(localStorage.getItem("user"));

// Fill UI
document.getElementById("name").innerText = user.name;
document.getElementById("enroll").innerText = user.enrollment;
document.getElementById("dept").innerText = user.department;
document.getElementById("sem").innerText = user.semester;

// Avatar
document.getElementById("avatar").innerText =
  user.name.split(" ").map(n=>n[0]).join("");

// 🔥 Load HOD (static optimized)
async function loadHOD(){
  const id = `${user.department}_${user.semester}`;
  const doc = await db.collection("hods").doc(id).get();

  if(doc.exists){
    document.getElementById("hod").innerText = doc.data().name;
  }
}
loadHOD();

// 📚 Static subjects
const subjects = [
  {name:"Java", code:"CS101"},
  {name:"DBMS", code:"CS102"},
  {name:"Maths", code:"MA101"},
  {name:"Physics", code:"PH101"}
];

let html = "";
subjects.forEach(sub=>{
  html += `
    <div class="subject" onclick="openSubject('${sub.name}')">
      <div>
        <div>${sub.name}</div>
        <div class="small">${sub.code}</div>
      </div>
      →
    </div>
  `;
});

document.getElementById("subjects").innerHTML = html;

// Navigate
function openSubject(name){
  localStorage.setItem("subject", name);
  window.location.href = "/subject.html";
}
</script>

</body>
</html>
