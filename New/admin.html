<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  background:#1e293b;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* Content */
.content{
  padding:20px;
  padding-bottom:100px;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.04));
  border:1px solid rgba(34,197,94,0.2);
  border-radius:16px;
  padding:20px;
  text-align:center;
  cursor:pointer;
}

.card:active{
  transform:scale(0.95);
}

.icon{
  font-size:32px;
  margin-bottom:10px;
}

.title{
  font-weight:700;
}

.desc{
  font-size:12px;
  color:#94a3b8;
}

/* Nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav div{
  color:#94a3b8;
  font-size:12px;
}

.active{color:#22c55e}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <h2>Admin Panel</h2>
</div>

<div class="content">

  <div class="grid">

    <div class="card" onclick="openCSV()">
      <div class="icon">📤</div>
      <div class="title">Upload CSV</div>
      <div class="desc">Import students</div>
    </div>

    <div class="card" onclick="openStudents()">
      <div class="icon">👥</div>
      <div class="title">Manage Students</div>
      <div class="desc">Edit & promote</div>
    </div>

    <div class="card" onclick="openSubjects()">
      <div class="icon">📚</div>
      <div class="title">Subjects</div>
      <div class="desc">Add / remove</div>
    </div>

    <div class="card" onclick="openTeachers()">
      <div class="icon">🎓</div>
      <div class="title">Teachers</div>
      <div class="desc">Assign subjects</div>
    </div>

  </div>

</div>

<div class="nav">
  <div onclick="goHome()">Home</div>
  <div>Subjects</div>
  <div class="active">Admin</div>
</div>

<script>
// Navigation
function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/dashboard.html";
}

// Pages
function openCSV(){
  window.location.href = "/admin-csv.html";
}

function openStudents(){
  window.location.href = "/admin-students.html";
}

function openSubjects(){
  window.location.href = "/admin-subjects.html";
}

function openTeachers(){
  window.location.href = "/admin-teachers.html";
}
</script>

</body>
</html>
