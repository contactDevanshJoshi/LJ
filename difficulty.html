<h2>Select Difficulty</h2>

<button onclick="setLevel('easy')">Easy</button>
<button onclick="setLevel('medium')">Medium</button>
<button onclick="setLevel('hard')">Hard</button>

<script>
function getParam(param) {
  return new URLSearchParams(window.location.search).get(param);
}

function setLevel(level) {
  const enrollment = getParam("enrollment");
  const subjectId = getParam("subjectId");
  const phase = getParam("phase");
  const chapterId = getParam("chapterId");

  window.location.href =
    `quiz.html?enrollment=${enrollment}&subjectId=${subjectId}&phase=${phase}&chapterId=${chapterId}&difficulty=${level}`;
}
</script>
