<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Difficulty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  background:#1e293b;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* Content */
.content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
}

/* Buttons */
.btn{
  width:80%;
  max-width:300px;
  padding:25px;
  border-radius:16px;
  background:#1e293b;
  text-align:center;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.95);
}

.easy{border:1px solid #22c55e}
.medium{border:1px solid #facc15}
.hard{border:1px solid #ef4444}

/* Bottom nav */
.nav{
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:#1e293b;
}

.nav div{
  color:#94a3b8;
  font-size:12px;
}

.active{color:#22c55e}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <h3>Select Difficulty</h3>
</div>

<div class="content">

  <div class="btn easy" onclick="selectLevel('easy')">🟢 Easy</div>
  <div class="btn medium" onclick="selectLevel('medium')">🟡 Medium</div>
  <div class="btn hard" onclick="selectLevel('hard')">🔴 Hard</div>

</div>

<div class="nav">
  <div onclick="goHome()">Home</div>
  <div class="active">Subjects</div>
  <div>Profile</div>
</div>

<script>
// Save difficulty
function selectLevel(level){
  localStorage.setItem("difficulty", level);
  window.location.href = "/quiz.html";
}

// Navigation
function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
