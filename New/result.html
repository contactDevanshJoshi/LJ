<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.circle{
  width:140px;
  height:140px;
  border-radius:50%;
  background:#22c55e20;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.score{
  font-size:36px;
  font-weight:bold;
  color:#22c55e;
}

.btn{
  padding:12px 20px;
  margin:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{background:#22c55e;color:#000;}
.secondary{background:#1e293b;color:#fff;}
</style>
</head>

<body>

<div class="circle">
  <div class="score" id="score">0/10</div>
</div>

<h2 id="message"></h2>

<div>
  <button class="btn secondary" onclick="showWrong()">Wrong Answers</button>
  <button class="btn secondary" onclick="retry()">Retry</button>
  <button class="btn primary" onclick="goHome()">Home</button>
</div>

<div id="wrongBox"></div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📦 Get data
const score = localStorage.getItem("score");
const total = localStorage.getItem("total");
const wrong = JSON.parse(localStorage.getItem("wrong") || "[]");
const user = JSON.parse(localStorage.getItem("user"));

// UI
document.getElementById("score").innerText = `${score}/${total}`;

// Message
let msg = "";
if(score/total >= 0.8) msg = "Excellent 🔥";
else if(score/total >= 0.5) msg = "Good 👍";
else msg = "Keep Practicing 💪";

document.getElementById("message").innerText = msg;

// 🔥 Save score
db.collection("scores").add({
  name: user.name,
  enrollment: user.enrollment,
  subject: localStorage.getItem("subject"),
  score: Number(score),
  total: Number(total),
  time: new Date()
});

// Show wrong answers
function showWrong(){
  let html = "<h3>Wrong Answers</h3>";

  wrong.forEach(w=>{
    html += `
      <p><b>${w.question}</b></p>
      <p style="color:red;">Your: ${w.selected}</p>
      <p style="color:lightgreen;">Correct: ${w.correct}</p>
      <hr>
    `;
  });

  document.getElementById("wrongBox").innerHTML = html;
}

// Retry
function retry(){
  window.location.href = "/difficulty.html";
}

// Home
function goHome(){
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
