<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Answers</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  background:#1e293b;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* Container */
.review-container{
  padding:20px;
  padding-bottom:100px;
}

/* Card */
.review-card{
  background:#1e293b;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

/* Question */
.question-num{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:6px;
}

.question-text{
  font-size:15px;
  font-weight:600;
  margin-bottom:12px;
}

/* Answers */
.review-row{
  display:flex;
  gap:10px;
}

.answer-section{
  flex:1;
}

.answer-label{
  font-size:11px;
  color:#94a3b8;
  margin-bottom:4px;
}

.answer-wrong{
  background:#ef4444;
  padding:8px;
  border-radius:8px;
}

.answer-correct{
  background:#22c55e;
  padding:8px;
  border-radius:8px;
}

/* Button */
.action-btn{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:#22c55e;
  color:#000;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <h3>Review Answers</h3>
</div>

<!-- Content -->
<div class="review-container" id="container"></div>

<script>
// 📦 Load wrong answers
const wrong = JSON.parse(localStorage.getItem("wrong") || "[]");
const container = document.getElementById("container");

// If no wrong answers
if(wrong.length === 0){
  container.innerHTML = `
    <div class="review-card">
      <div class="question-text">🎉 Perfect! No wrong answers.</div>
    </div>
    <button class="action-btn primary" onclick="retry()">Retry Quiz</button>
  `;
} else {

  wrong.forEach((w, i)=>{
    container.innerHTML += `
      <div class="review-card">
        <div class="question-num">Question ${i+1}</div>
        <div class="question-text">${w.question}</div>

        <div class="review-row">
          <div class="answer-section">
            <div class="answer-label">Your Answer</div>
            <div class="answer-wrong">${w.selected}</div>
          </div>

          <div class="answer-section">
            <div class="answer-label">Correct Answer</div>
            <div class="answer-correct">${w.correct}</div>
          </div>
        </div>
      </div>
    `;
  });

  container.innerHTML += `
    <button class="action-btn primary" onclick="retry()">Retry Quiz</button>
  `;
}

// 🔁 Navigation
function goBack(){
  window.history.back();
}

function retry(){
  window.location.href = "/difficulty.html";
}
</script>

</body>
</html>
