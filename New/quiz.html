<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.option{
  background:#1e293b;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
}

.option.correct{background:#22c55e;}
.option.wrong{background:#ef4444;}
</style>
</head>

<body>

<div id="quiz"></div>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📦 Data from previous pages
const subject = localStorage.getItem("subject");
const phase = localStorage.getItem("phase");
const chapter = localStorage.getItem("chapter");
const difficulty = localStorage.getItem("difficulty");

let questions = [];
let current = 0;
let score = 0;
let wrongAnswers = [];

// 🔥 Load questions
async function loadQuestions(){
  const snap = await db.collection("questions")
    .where("subject","==",subject)
    .where("phase","==",phase)
    .where("difficulty","==",difficulty)
    .get();

  questions = snap.docs.map(doc => doc.data());

  // Random 10
  questions = questions.sort(()=>0.5-Math.random()).slice(0,10);

  showQuestion();
}

function showQuestion(){
  if(current >= questions.length){
    showResult();
    return;
  }

  const q = questions[current];

  document.getElementById("quiz").innerHTML = `
    <div class="card">
      <b>Q${current+1}:</b> ${q.question}
    </div>

    <div class="option" onclick="answer('${q.correct}','${q.option1}')">${q.option1}</div>
    <div class="option" onclick="answer('${q.correct}','${q.option2}')">${q.option2}</div>
    <div class="option" onclick="answer('${q.correct}','${q.option3}')">${q.option3}</div>
    <div class="option" onclick="answer('${q.correct}','${q.option4}')">${q.option4}</div>
  `;
}

function answer(correct, selected){
  const options = document.querySelectorAll(".option");

  options.forEach(opt=>{
    if(opt.innerText === correct){
      opt.classList.add("correct");
    }
    if(opt.innerText === selected && selected !== correct){
      opt.classList.add("wrong");
    }
    opt.style.pointerEvents="none";
  });

  if(selected === correct){
    score++;
  } else {
    wrongAnswers.push({
      question: questions[current].question,
      correct: correct,
      selected: selected
    });
  }

  setTimeout(()=>{
    current++;
    showQuestion();
  },1000);
}

// 🎯 Result
function showResult(){
  document.getElementById("quiz").innerHTML = `
    <div class="card">
      <h2>Score: ${score} / ${questions.length}</h2>
      <button onclick="showWrong()">View Wrong Answers</button>
    </div>
  `;

  localStorage.setItem("score", score);
localStorage.setItem("total", questions.length);
localStorage.setItem("wrong", JSON.stringify(wrongAnswers));

window.location.href = "/result.html";
}

// ❌ Wrong answers
function showWrong(){
  let html = "<div class='card'><h3>Wrong Answers</h3>";

  wrongAnswers.forEach(w=>{
    html += `
      <p><b>Q:</b> ${w.question}</p>
      <p style="color:red;">Your: ${w.selected}</p>
      <p style="color:lightgreen;">Correct: ${w.correct}</p>
      <hr>
    `;
  });

  html += "</div>";

  document.getElementById("quiz").innerHTML = html;
}

loadQuestions();
</script>

</body>
</html>
