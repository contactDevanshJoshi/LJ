<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapters</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  background:#1e293b;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* Content */
.content{
  padding:20px;
  padding-bottom:100px;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:#1e293b;
  border-radius:12px;
  padding:16px;
  cursor:pointer;
}

.card.full{
  grid-column:1/3;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav div{
  color:#94a3b8;
  font-size:12px;
}

.active{color:#22c55e}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <h3 id="title">Phase</h3>
</div>

<div class="content">

  <div class="grid" id="chapters"></div>

</div>

<div class="nav">
  <div onclick="goHome()">Home</div>
  <div class="active">Subjects</div>
  <div>Profile</div>
</div>

<script>
// 📦 Get data
const subject = localStorage.getItem("subject");
const phase = localStorage.getItem("phase");

document.getElementById("title").innerText = `${subject} - ${phase}`;

// Static chapters (simple + fast)
const chapters = [
  "Chapter 1",
  "Chapter 2",
  "Chapter 3"
];

let html = "";

// Normal chapters
chapters.forEach(ch => {
  html += `
    <div class="card" onclick="openQuiz('${ch}')">
      ${ch}
    </div>
  `;
});

// Full phase
html += `
  <div class="card full" onclick="openQuiz('FULL')">
    <div>Full ${phase}</div>
    →
  </div>
`;

document.getElementById("chapters").innerHTML = html;

// Navigation
function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/dashboard.html";
}

// Next step
function openQuiz(chapter){
  localStorage.setItem("chapter", chapter);
  window.location.href = "/difficulty.html";
}
</script>

</body>
</html>
