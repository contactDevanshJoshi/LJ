<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Container */
.container{
  padding:20px;
  padding-bottom:100px;
}

/* Card/Form */
.form{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.input, select, textarea{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:#fff;
}

textarea{height:80px;resize:none}

/* Button */
.btn{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* Question list */
.question-card{
  background:#1e293b;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
}

.question-header{
  display:flex;
  justify-content:space-between;
}

.delete{
  color:red;
  cursor:pointer;
}

.meta{
  font-size:12px;
  color:#94a3b8;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Teacher Panel</h2>
</div>

<div class="container">

  <!-- CSV Upload -->
  <div class="form">
    <h3 style="margin-bottom:10px;">Upload Questions CSV</h3>
    <input type="file" id="csvFile" accept=".csv">
    <button class="btn" onclick="uploadCSV()">Upload CSV</button>
  </div>

  <!-- Manual Add -->
  <div class="form">
    <h3 style="margin-bottom:10px;">Add Question</h3>

    <select id="subject">
      <option value="">Subject</option>
      <option value="math">Math</option>
      <option value="physics">Physics</option>
    </select>

    <select id="chapter">
      <option value="">Chapter</option>
      <option value="ch1">Chapter 1</option>
      <option value="ch2">Chapter 2</option>
    </select>

    <select id="difficulty">
      <option value="">Difficulty</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <textarea id="question" placeholder="Question"></textarea>

    <input id="a" placeholder="Option A">
    <input id="b" placeholder="Option B">
    <input id="c" placeholder="Option C">
    <input id="d" placeholder="Option D">

    <select id="correct">
      <option value="">Correct Answer</option>
      <option value="0">A</option>
      <option value="1">B</option>
      <option value="2">C</option>
      <option value="3">D</option>
    </select>

    <button class="btn" onclick="addQuestion()">Add Question</button>
  </div>

  <!-- Question List -->
  <div id="list"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Add Manual Question
window.addQuestion = async function(){

  const subject = subjectEl.value;
  const chapter = chapterEl.value;
  const difficulty = difficultyEl.value;
  const question = questionEl.value;

  const options = [aEl.value,bEl.value,cEl.value,dEl.value];
  const correct = correctEl.value;

  if(!subject || !chapter || !difficulty || !question || options.includes("") || correct===""){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"questions"),{
    subject, chapter, difficulty, question, options, correct
  });

  alert("Added ✅");
  loadQuestions();
};

// 📤 CSV Upload
window.uploadCSV = function(){
  const file = document.getElementById("csvFile").files[0];

  if(!file){
    alert("Select CSV");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){
    const rows = e.target.result.split("\n").map(r=>r.split(","));

    for(let i=1;i<rows.length;i++){
      const r = rows[i];
      if(r.length<9) continue;

      await addDoc(collection(db,"questions"),{
        subject:r[0],
        chapter:r[1],
        difficulty:r[2],
        question:r[3],
        options:[r[4],r[5],r[6],r[7]],
        correct:r[8]
      });
    }

    alert("CSV Uploaded ✅");
    loadQuestions();
  };

  reader.readAsText(file);
};

// 📥 Load Questions
async function loadQuestions(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db,"questions"));

  snap.forEach(docSnap=>{
    const q = docSnap.data();

    list.innerHTML += `
      <div class="question-card">
        <div class="question-header">
          <div>${q.question}</div>
          <div class="delete" onclick="deleteQ('${docSnap.id}')">🗑</div>
        </div>
        <div class="meta">${q.subject} | ${q.chapter} | ${q.difficulty}</div>
      </div>
    `;
  });
}

// 🗑 Delete
window.deleteQ = async function(id){
  await deleteDoc(doc(db,"questions",id));
  loadQuestions();
};

// Cache elements
const subjectEl = document.getElementById("subject");
const chapterEl = document.getElementById("chapter");
const difficultyEl = document.getElementById("difficulty");
const questionEl = document.getElementById("question");
const aEl = document.getElementById("a");
const bEl = document.getElementById("b");
const cEl = document.getElementById("c");
const dEl = document.getElementById("d");
const correctEl = document.getElementById("correct");

// Init
loadQuestions();

</script>

</body>
</html>
