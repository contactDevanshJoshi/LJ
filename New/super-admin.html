<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Content */
.content{
  padding:20px;
  padding-bottom:100px;
}

/* Form */
.form{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:#fff;
}

.btn{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* List */
.card{
  background:#1e293b;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete{
  color:red;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h2>Super Admin Panel</h2>
</div>

<div class="content">

  <!-- FORM -->
  <div class="form">
    <input id="dept" class="input" placeholder="Department (CSE)">
    <input id="sem" class="input" placeholder="Semester (1)">
    <input id="name" class="input" placeholder="HOD Name">

    <button class="btn" onclick="addHOD()">Add HOD</button>
  </div>

  <!-- LIST -->
  <div id="list"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addHOD = async function(){
  const dept = document.getElementById("dept").value;
  const sem = document.getElementById("sem").value;
  const name = document.getElementById("name").value;

  if(!dept || !sem || !name){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"hods"),{
    department: dept,
    semester: sem,
    name: name
  });

  loadHOD();
};

async function loadHOD(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db,"hods"));

  snap.forEach(docSnap=>{
    const d = docSnap.data();

    list.innerHTML += `
      <div class="card">
        <div>
          <b>${d.name}</b><br>
          ${d.department} - Sem ${d.semester}
        </div>
        <div class="delete" onclick="deleteHOD('${docSnap.id}')">🗑</div>
      </div>
    `;
  });
}

window.deleteHOD = async function(id){
  await deleteDoc(doc(db,"hods",id));
  loadHOD();
};

loadHOD();
</script>

</body>
</html>
