<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button onclick="checkAdmin()">Enter</button>

<div id="adminPanel" style="display:none;">
  <h3>Add Student</h3>

  <input type="text" id="enroll" placeholder="Enrollment No"><br>
  <input type="text" id="name" placeholder="Name"><br>
  <input type="text" id="dept" placeholder="Department"><br>
  <input type="text" id="sem" placeholder="Semester"><br>
  <input type="text" id="hod" placeholder="HOD Name"><br>

  <button onclick="addStudent()">Add Student</button>

  <hr>

  <h3>Add Subject</h3>

  <input type="text" id="subName" placeholder="Subject Name"><br>
  <input type="text" id="subDept" placeholder="Department"><br>
  <input type="text" id="subSem" placeholder="Semester"><br>

  <button onclick="addSubject()">Add Subject</button>

<hr>

<h3>Add Teacher</h3>

<input type="text" id="teacherId" placeholder="Teacher ID"><br>
<input type="text" id="teacherName" placeholder="Teacher Name"><br>
<input type="text" id="teacherDept" placeholder="Department"><br>
<input type="text" id="teacherSubjectId" placeholder="Subject ID"><br>
<input type="password" id="teacherKey" placeholder="Teacher Key"><br>

<button onclick="addTeacher()">Add Teacher</button>

<hr>

<h3>Add Teaching Phase</h3>
<input type="text" id="phaseSubjectId" placeholder="Subject ID"><br>
<input type="text" id="phaseName" placeholder="T1 / T2"><br>
<button onclick="addPhase()">Add Phase</button>

<hr>

<h3>Add Chapter</h3>
<input type="text" id="chapterSubjectId" placeholder="Subject ID"><br>
<input type="text" id="chapterPhase" placeholder="T1"><br>
<input type="text" id="chapterName" placeholder="Chapter Name"><br>
<button onclick="addChapter()">Add Chapter</button>
</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
