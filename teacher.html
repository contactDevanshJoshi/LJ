<h2>Teacher Login</h2>

<input type="text" id="teacherId" placeholder="Teacher ID">
<input type="password" id="teacherKey" placeholder="Teacher Key">

<button onclick="loginTeacher()">Login</button>

<div id="panel" style="display:none;">
  <h3>Add Question</h3>

  <input type="text" id="phase" placeholder="T1"><br>
  <input type="text" id="chapterId" placeholder="Chapter ID"><br>
  <input type="text" id="difficulty" placeholder="easy/medium/hard"><br>

  <input type="text" id="question" placeholder="Question"><br>

  <input type="text" id="opt1" placeholder="Option 1"><br>
  <input type="text" id="opt2" placeholder="Option 2"><br>
  <input type="text" id="opt3" placeholder="Option 3"><br>
  <input type="text" id="opt4" placeholder="Option 4"><br>

  <input type="text" id="correct" placeholder="Correct Answer"><br>

  <button onclick="addQuestion()">Add Question</button>
</div>

<script type="module" src="js/teacher.js"></script>
