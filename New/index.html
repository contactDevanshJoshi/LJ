<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; }

    .app-shell {
      height: 100%;
      width: 100%;
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: 100px;
    }

    .logo-ring {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border-radius: 16px;
      padding: 28px 20px;
    }

    .input-field {
      width: 100%;
      padding: 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn-primary:hover { opacity: 0.9; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e293b;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #64748b;
      font-size: 11px;
    }

    .nav-item.active { color: #22c55e; }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>

<body>
<div class="app-shell">

  <div class="login-container">

    <div class="logo-ring">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <path d="M20 4L4 14l16 10 16-10L20 4z" fill="#fff"/>
      </svg>
    </div>

    <h1 style="color:#fff; font-size:24px; font-weight:800; margin-bottom:8px;">
      Student Portal
    </h1>

    <p style="color:#94a3b8; margin-bottom:32px; text-align:center;">
      Enter your enrollment number to continue
    </p>

    <div class="login-card">
      <input id="enrollment" class="input-field" placeholder="Enrollment Number">

      <button id="loginBtn" class="btn-primary" onclick="login()">
        Login
      </button>
    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item active">
      <i data-lucide="home"></i>
      Home
    </div>
    <div class="nav-item">
      <i data-lucide="book-open"></i>
      Subjects
    </div>
    <div class="nav-item">
      <i data-lucide="user"></i>
      Profile
    </div>
  </nav>

</div>

<script>
  lucide.createIcons();

  // 🔥 Firebase Config
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🔐 LOGIN FUNCTION
  async function login() {
    const enrollInput = document.getElementById("enrollment");
    const btn = document.getElementById("loginBtn");
    const enroll = enrollInput.value.trim();

    if (!enroll) {
      alert("Enter enrollment number");
      return;
    }

    btn.innerText = "Checking...";
    btn.classList.add("loading");

    try {
      const doc = await db.collection("users").doc(enroll).get();

      if (!doc.exists) {
        alert("User not found");
        btn.innerText = "Login";
        btn.classList.remove("loading");
        return;
      }

      const user = doc.data();
      localStorage.setItem("user", JSON.stringify(user));

      // 🔁 ROLE REDIRECT
      if (user.role === "student") {
        window.location.href = "/student/dashboard.html";
      } else if (user.role === "admin") {
        window.location.href = "/admin/admin.html";
      } else if (user.role === "teacher") {
        window.location.href = "/teacher/teacher.html";
      } else if (user.role === "superadmin") {
        window.location.href = "/superadmin/superadmin.html";
      }

    } catch (err) {
      alert("Error: " + err.message);
      btn.innerText = "Login";
      btn.classList.remove("loading");
    }
  }
</script>

</body>
</html>
